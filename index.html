<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios (CRUD)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-submit { background-color: #4CAF50; color: white; }
        .btn-edit { background-color: #2196F3; color: white; margin-right: 5px; }
        .btn-delete { background-color: #f44336; color: white; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h2>Gestión de Usuarios (CRUD)</h2>
    
    <h3 id="form-title">Añadir Nuevo Usuario</h3>
    <form id="usuario-form">
        <input type="hidden" id="usuario-id">
        <div class="form-group">
            <input type="text" id="nombre" placeholder="Ingresa el nombre" required>
        </div>
        <div class="form-group">
            <input type="email" id="email" placeholder="Ingresa el correo" required>
        </div>
        <button type="submit" class="btn-submit" id="btn-guardar">Guardar Usuario</button>
    </form>

    <h3>Lista de Usuarios</h3>
    <ul id="lista-usuarios"></ul>

    <script>
        // CAMBIO: Usamos ruta relativa para que funcione en la nube
        const URL_API = "/usuarios"; 
        
        const form = document.getElementById('usuario-form');
        const listaUsuarios = document.getElementById('lista-usuarios');
        const usuarioIdInput = document.getElementById('usuario-id');
        const nombreInput = document.getElementById('nombre');
        const emailInput = document.getElementById('email');
        const formTitle = document.getElementById('form-title');
        const btnGuardar = document.getElementById('btn-guardar');

        document.addEventListener('DOMContentLoaded', obtenerUsuarios);

        async function obtenerUsuarios() {
            try {
                const res = await fetch(URL_API);
                const usuarios = await res.json();
                listaUsuarios.innerHTML = '';
                usuarios.forEach(user => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div><strong>${user.nombre}</strong> (${user.email})</div>
                        <div>
                            <button class="btn-edit" onclick="prepararEditar(${user.id}, '${user.nombre}', '${user.email}')">Editar</button>
                            <button class="btn-delete" onclick="eliminarUsuario(${user.id})">Eliminar</button>
                        </div>
                    `;
                    listaUsuarios.appendChild(li);
                });
            } catch (err) {
                console.error("Error al obtener usuarios:", err);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = usuarioIdInput.value;
            const datos = { nombre: nombreInput.value, email: emailInput.value };

            try {
                if (id) {
                    await fetch(`${URL_API}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datos)
                    });
                } else {
                    await fetch(URL_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datos)
                    });
                }
                form.reset();
                resetearFormulario();
                obtenerUsuarios();
            } catch (err) {
                console.error("Error al guardar usuario:", err);
            }
        });

        async function eliminarUsuario(id) {
            if (confirm("¿Seguro que deseas eliminar este usuario?")) {
                try {
                    await fetch(`${URL_API}/${id}`, { method: 'DELETE' });
                    obtenerUsuarios();
                } catch (err) {
                    console.error("Error al eliminar usuario:", err);
                }
            }
        }

        function prepararEditar(id, nombre, email) {
            usuarioIdInput.value = id;
            nombreInput.value = nombre;
            emailInput.value = email;
            formTitle.textContent = "Editar Usuario";
            btnGuardar.textContent = "Actualizar Usuario";
        }

        function resetearFormulario() {
            usuarioIdInput.value = '';
            formTitle.textContent = "Añadir Nuevo Usuario";
            btnGuardar.textContent = "Guardar Usuario";
        }
    </script>
</body>
</html>
